<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropTrader - Live Sports Trading</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .trading-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-live {
            background: #dc3545;
            color: white;
            animation: pulse 2s infinite;
        }
        .status-final {
            background: #6c757d;
            color: white;
        }
        .status-upcoming {
            background: #28a745;
            color: white;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .live-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #dc3545;
        }
        .game-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
        }
        .player-stats {
            background: #e9ecef;
            border-radius: 8px;
            padding: 8px;
            margin: 5px 0;
        }
        .btn-trade {
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-trade:hover {
            transform: scale(1.05);
        }
        .filters {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .portfolio-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #007bff;
        }
        .trade-history {
            max-height: 400px;
            overflow-y: auto;
        }
        .trade-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #28a745;
        }
        .trade-sell {
            border-left-color: #dc3545;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-chart-line"></i> PropTrader
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text" id="user-info">
                    <i class="fas fa-user"></i> <span id="username">Guest</span>
                </span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Login/Register Forms -->
        <div id="auth-forms" class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <ul class="nav nav-tabs" id="authTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">Login</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">Register</button>
                            </li>
                        </ul>
                        <div class="tab-content" id="authTabContent">
                            <div class="tab-pane fade show active" id="login">
                                <form id="login-form" class="mt-3">
                                    <div class="mb-3">
                                        <label for="login-username" class="form-label">Username</label>
                                        <input type="text" class="form-control" id="login-username" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="login-password" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="login-password" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Login</button>
                                </form>
                            </div>
                            <div class="tab-pane fade" id="register">
                                <form id="register-form" class="mt-3">
                                    <div class="mb-3">
                                        <label for="register-username" class="form-label">Username</label>
                                        <input type="text" class="form-control" id="register-username" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="register-email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="register-email" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="register-password" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="register-password" required>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100">Register</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Dashboard -->
        <div id="dashboard" style="display: none;">
            <div class="row">
                <div class="col-md-8">
                    <!-- Market Section -->
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-chart-bar"></i> Live Market</h5>
                        </div>
                        <div class="card-body">
                            <!-- Filters -->
                            <div class="filters">
                                <div class="row">
                                    <div class="col-md-3">
                                        <label class="form-label">Sport</label>
                                        <select class="form-select" id="sport-filter">
                                            <option value="">All Sports</option>
                                            <option value="NBA">NBA</option>
                                            <option value="MLB">MLB</option>
                                            <option value="NFL">NFL</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Difficulty</label>
                                        <select class="form-select" id="difficulty-filter">
                                            <option value="">All Difficulties</option>
                                            <option value="EASY">Easy</option>
                                            <option value="MEDIUM">Medium</option>
                                            <option value="HARD">Hard</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Status</label>
                                        <select class="form-select" id="status-filter">
                                            <option value="">All Status</option>
                                            <option value="UPCOMING">Upcoming</option>
                                            <option value="LIVE">Live</option>
                                            <option value="FINAL">Final</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <button class="btn btn-outline-primary w-100 mt-4" onclick="refreshMarket()">
                                            <i class="fas fa-sync-alt"></i> Refresh
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Props List -->
                            <div id="props-container">
                                <!-- Props will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <!-- Portfolio Section -->
                    <div class="card mb-3">
                        <div class="card-header">
                            <h5><i class="fas fa-briefcase"></i> Portfolio</h5>
                        </div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-3">
                                <span>Balance:</span>
                                <span class="fw-bold" id="user-balance">$1000.00</span>
                            </div>
                            <div id="portfolio-items">
                                <!-- Portfolio items will be loaded here -->
                            </div>
                        </div>
                    </div>

                    <!-- Trade History -->
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-history"></i> Trade History</h5>
                        </div>
                        <div class="card-body">
                            <div id="trade-history" class="trade-history">
                                <!-- Trade history will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Trading Modal -->
    <div class="modal fade" id="tradingModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tradingModalTitle">Trade Contract</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="trading-details">
                        <!-- Trading details will be loaded here -->
                    </div>
                    <div class="mb-3">
                        <label for="trade-quantity" class="form-label">Quantity</label>
                        <input type="number" class="form-control" id="trade-quantity" min="1" value="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Current Live Price</label>
                        <div class="live-price" id="current-live-price">$0.00</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="executeTrade('buy')">Buy</button>
                    <button type="button" class="btn btn-danger" onclick="executeTrade('sell')">Sell</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = window.location.origin + '/api';
        let currentUser = null;
        let liveUpdateInterval = null;

        // Authentication
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('jwt_token', data.token);
                    currentUser = data.user;
                    showDashboard();
                    loadMarketData();
                    loadPortfolio();
                    loadTradeHistory();
                    startLiveUpdates();
                } else {
                    alert('Login failed: ' + data.error);
                }
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('jwt_token', data.token);
                    currentUser = data.user;
                    showDashboard();
                    loadMarketData();
                    loadPortfolio();
                    loadTradeHistory();
                    startLiveUpdates();
                } else {
                    alert('Registration failed: ' + data.error);
                }
            } catch (error) {
                alert('Registration failed: ' + error.message);
            }
        });

        function showDashboard() {
            document.getElementById('auth-forms').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('username').textContent = currentUser.username;
        }

        // Market Data
        async function loadMarketData() {
            try {
                const sportFilter = document.getElementById('sport-filter').value;
                const difficultyFilter = document.getElementById('difficulty-filter').value;
                const statusFilter = document.getElementById('status-filter').value;

                let url = `${API_BASE}/market/props?limit=50`;
                if (sportFilter) url += `&sport=${sportFilter}`;
                if (difficultyFilter) url += `&difficulty=${difficultyFilter}`;

                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    displayProps(data.props, statusFilter);
                } else {
                    console.error('Error loading props:', data.error);
                }
            } catch (error) {
                console.error('Error loading market data:', error);
            }
        }

        function displayProps(props, statusFilter) {
            const container = document.getElementById('props-container');
            container.innerHTML = '';

            props.forEach(prop => {
                // Apply status filter
                if (statusFilter && prop.status_badge !== statusFilter) {
                    return;
                }

                const card = document.createElement('div');
                card.className = 'trading-card';
                
                const statusClass = prop.status_badge === 'LIVE' ? 'status-live' : 
                                  prop.status_badge === 'FINAL' ? 'status-final' : 'status-upcoming';

                // Format prop type for display
                const formatPropType = (propType) => {
                    return propType.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                };

                card.innerHTML = `
                    <div class="row">
                        <div class="col-md-8">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <h6 class="mb-0">${prop.player_name} (${prop.player_team})</h6>
                                    <small class="text-muted">
                                        ${prop.player_position || ''} ${prop.opponent_info || ''} 
                                        ${prop.formatted_game_time ? `• ${prop.formatted_game_time}` : ''}
                                    </small>
                                </div>
                                <span class="status-badge ${statusClass}">${prop.status_badge}</span>
                            </div>
                            <p class="text-muted mb-2">${prop.sport} • ${formatPropType(prop.prop_type)} • ${prop.difficulty}</p>
                            
                            ${prop.game_status === 'LIVE' || prop.game_status === 'FINISHED' ? `
                                <div class="game-info">
                                    <small><strong>Game Time:</strong> ${prop.current_game_time || 'N/A'}</small><br>
                                    <small><strong>Score:</strong> ${prop.live_score || 'N/A'}</small><br>
                                    <small><strong>Player Value:</strong> ${prop.player_current_value || 0}</small>
                                </div>
                            ` : ''}
                            
                                                            <div class="player-stats">
                                    <strong>Line:</strong> ${prop.line_value} | 
                                    <strong>Current Price:</strong> <span class="live-price">$${prop.live_contract_price.toFixed(2)}</span>
                                    <br><small class="text-muted">Contracts: ${prop.available_contracts}/${prop.total_contracts} available</small>
                                </div>
                        </div>
                        <div class="col-md-4">
                            ${(() => {
                                if (!prop.is_tradeable) {
                                    return '<div class="text-muted">Trading Closed</div>';
                                }
                                
                                let tradingOptions = '';
                                if (prop.difficulty === 'EASY' || prop.difficulty === 'HARD') {
                                    tradingOptions = `
                                        <button class="btn btn-primary btn-trade w-100 mb-2" onclick="openTradingModal(${prop.id}, 'over')">
                                            OVER ${prop.line_value}
                                        </button>
                                    `;
                                } else if (prop.difficulty === 'MEDIUM') {
                                    tradingOptions = `
                                        <button class="btn btn-success btn-trade w-100 mb-2" onclick="openTradingModal(${prop.id}, 'over')">
                                            OVER ${prop.line_value}
                                        </button>
                                        <button class="btn btn-danger btn-trade w-100 mb-2" onclick="openTradingModal(${prop.id}, 'under')">
                                            UNDER ${prop.line_value}
                                        </button>
                                    `;
                                }
                                return tradingOptions;
                            })()}
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Trading
        function openTradingModal(propId, type) {
            document.getElementById('tradingModalTitle').textContent = `Trade ${type.toUpperCase()} Contract`;
            document.getElementById('trading-details').innerHTML = `
                <p><strong>Prop ID:</strong> ${propId}</p>
                <p><strong>Type:</strong> ${type.toUpperCase()}</p>
            `;
            window.currentTradingProp = { id: propId, type: type };
            
            // Update live price
            updateLivePrice(propId);
            
            const modal = new bootstrap.Modal(document.getElementById('tradingModal'));
            modal.show();
        }

        async function updateLivePrice(propId) {
            try {
                const response = await fetch(`${API_BASE}/market/live-updates`);
                const data = await response.json();
                
                const prop = data.updates.find(u => u.prop_id === propId);
                if (prop) {
                    document.getElementById('current-live-price').textContent = `$${prop.live_contract_price.toFixed(2)}`;
                }
            } catch (error) {
                console.error('Error updating live price:', error);
            }
        }

        async function executeTrade(action) {
            const quantity = parseInt(document.getElementById('trade-quantity').value);
            const propId = window.currentTradingProp?.id || 1;
            const tradeType = window.currentTradingProp?.type || 'over';

            try {
                const response = await fetch(`${API_BASE}/market/trade`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`
                    },
                    body: JSON.stringify({
                        prop_id: propId,
                        quantity: quantity,
                        trade_type: tradeType,
                        action: action
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    alert(`${action.toUpperCase()} successful! New balance: $${data.new_balance.toFixed(2)}`);
                    loadPortfolio();
                    loadTradeHistory();
                    bootstrap.Modal.getInstance(document.getElementById('tradingModal')).hide();
                } else {
                    alert('Trade failed: ' + data.error);
                }
            } catch (error) {
                console.error('Error executing trade:', error);
                alert('Trade failed: ' + error.message);
            }
        }

        // Portfolio
        async function loadPortfolio() {
            try {
                const response = await fetch(`${API_BASE}/portfolio`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` }
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('user-balance').textContent = `$${data.balance.toFixed(2)}`;
                    displayPortfolio(data.portfolio);
                }
            } catch (error) {
                console.error('Error loading portfolio:', error);
            }
        }

        function displayPortfolio(portfolio) {
            const container = document.getElementById('portfolio-items');
            container.innerHTML = '';

            if (portfolio.length === 0) {
                container.innerHTML = '<p class="text-muted">No active positions</p>';
                return;
            }

            portfolio.forEach(item => {
                const div = document.createElement('div');
                div.className = 'portfolio-item';
                div.innerHTML = `
                    <div class="d-flex justify-content-between">
                        <div>
                            <strong>${item.player_name}</strong><br>
                            <small>${item.prop_type} ${item.trade_type}</small>
                        </div>
                        <div class="text-end">
                            <div>Qty: ${item.quantity}</div>
                            <div class="live-price">$${item.live_price.toFixed(2)}</div>
                        </div>
                    </div>
                    ${item.game_status === 'LIVE' ? `
                        <small class="text-danger">LIVE - ${item.current_game_time}</small>
                    ` : ''}
                `;
                container.appendChild(div);
            });
        }

        // Trade History
        async function loadTradeHistory() {
            try {
                const response = await fetch(`${API_BASE}/portfolio/trades`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` }
                });
                const data = await response.json();

                if (response.ok) {
                    displayTradeHistory(data.trades);
                }
            } catch (error) {
                console.error('Error loading trade history:', error);
            }
        }

        function displayTradeHistory(trades) {
            const container = document.getElementById('trade-history');
            container.innerHTML = '';

            if (trades.length === 0) {
                container.innerHTML = '<p class="text-muted">No trades yet</p>';
                return;
            }

            trades.forEach(trade => {
                const div = document.createElement('div');
                div.className = `trade-item ${trade.action === 'SELL' ? 'trade-sell' : ''}`;
                div.innerHTML = `
                    <div class="d-flex justify-content-between">
                        <div>
                            <strong>${trade.player_name || 'Unknown'}</strong><br>
                            <small>${trade.prop_type} ${trade.trade_type}</small>
                        </div>
                        <div class="text-end">
                            <div class="${trade.action === 'BUY' ? 'text-success' : 'text-danger'}">
                                ${trade.action} ${trade.quantity}
                            </div>
                            <small>$${trade.price.toFixed(2)}</small>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Live Updates
        function startLiveUpdates() {
            if (liveUpdateInterval) {
                clearInterval(liveUpdateInterval);
            }
            
            liveUpdateInterval = setInterval(async () => {
                await loadMarketData();
                await loadPortfolio();
            }, 30000); // Update every 30 seconds
        }

        function refreshMarket() {
            loadMarketData();
        }

        // Filter event listeners
        document.getElementById('sport-filter').addEventListener('change', loadMarketData);
        document.getElementById('difficulty-filter').addEventListener('change', loadMarketData);
        document.getElementById('status-filter').addEventListener('change', (e) => {
            loadMarketData(); // This will apply the status filter in displayProps
        });

        // Check if user is already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('jwt_token');
            if (token) {
                // Try to load user data
                loadMarketData();
                loadPortfolio();
                loadTradeHistory();
                startLiveUpdates();
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('auth-forms').style.display = 'none';
            }
        });
    </script>
</body>
</html>
